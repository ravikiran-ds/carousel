<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Live Gallery</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" type="image/png">
    <link rel="icon" href="data:,">
    <meta name="theme-color" content="#0c0c0c">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img id="imgScanner" style="display: none;" crossorigin="anonymous">

    <div id="splashScreen" class="splash-overlay">
        <div class="text-center">
            <div class="ring-spinner mb-4"><div></div><div></div><div></div><div></div></div>
            <h2 class="fw-bold text-gradient">Opening Live Gallery</h2>
            <p id="splashStatus" class="text-muted small px-3">Connecting to cloud assets...</p>
        </div>
    </div>

    <header class="text-center py-4 mt-2">
        <h1 class="fw-bold text-gradient">Our Live Gallery</h1>
        <p class="text-muted small">Scroll to view memories • Tap an image to expand</p>
    </header>

    <main class="container mb-5">
        <div id="photoGrid" class="masonry-grid"></div>
    </main>

    <div id="lightbox" class="lightbox-modal" onclick="closeLightbox(event)">
        <span class="close-btn" onclick="closeLightbox(event)">&times;</span>
        
        <button class="action-btn share-btn" onclick="shareActiveImage(event)" title="Share Image">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.5 2.5 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488 1.056l-6.718-3.12a2.5 2.5 0 1 1 0-2.688l6.718-3.12A2.5 2.5 0 0 1 11 2.5m-8.5 4a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3m11 5.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3"/>
            </svg>
        </button>

        <button class="nav-btn prev-btn" onclick="changeImage(-1, event)">&#10094;</button>
        <button class="nav-btn next-btn" onclick="changeImage(1, event)">&#10095;</button>
        
        <div class="lightbox-content-wrapper">
            <div id="lightboxMediaContainer"></div>
        </div>
    </div>

    <div class="upload-section d-none" id="uploadBar">
        <div class="d-flex justify-content-center align-items-center gap-2 max-width-md mx-auto px-3">
            <input type="file" id="photoInput" accept="image/*,video/*" class="form-control form-control-dark" style="max-width: 250px;" multiple>
            <button class="btn btn-primary px-4" id="uploadBtn" onclick="uploadPhoto()">Upload</button>
        </div>
        <div id="uploadStatus" class="mt-2 small text-muted"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js?v=1.0.1"></script>
</body>
</html>
